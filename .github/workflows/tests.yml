name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Validate OpenAPI spec
        run: python -m json.tool adapters/openapi.json > /tmp/cycle-fairy-openapi.json
